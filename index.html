<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="favicon.png">
	<title>q5play</title>
	<style>
		html,
		body {
			background-color: black;
			margin: 0;
			padding: 0;
			overflow: hidden;
			overscroll-behavior: none;
		}

		#debug-hud {
			position: fixed;
			top: 10px;
			right: 10px;
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			gap: 4px;
			pointer-events: none;
			font-family: monospace;
			font-size: 12px;
			z-index: 100;
		}

		#stopwatch {
			position: fixed;
			top: 10px;
			left: 10px;
			padding: 4px 10px;
			background: rgba(0, 0, 0, 0.65);
			color: #f1c40f;
			border: 1px solid rgba(241, 196, 15, 0.75);
			border-radius: 3px;
			font-family: monospace;
			font-size: 16px;
			line-height: 1;
			pointer-events: none;
			z-index: 100;
		}

		#start-screen,
		#level-complete-screen {
			position: fixed;
			inset: 0;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 18px;
			background: #000000;
			color: #ecf0f1;
			font-family: monospace;
			pointer-events: none;
			z-index: 200;
		}

		#start-screen {
			display: flex;
		}

		#level-complete-screen {
			display: none;
		}

		#start-screen h1,
		#level-complete-screen h1 {
			margin: 0;
			color: #f1c40f;
			font-size: 48px;
			font-weight: 700;
		}

		#start-time,
		#level-complete-score,
		#level-complete-records,
		#level-complete-time {
			font-size: 24px;
		}

		#start-prompt,
		#level-complete-restart {
			font-size: 18px;
		}

		#debug-hud .hud-tag {
			padding: 2px 8px;
			border-radius: 3px;
			display: none;
		}

		#hud-fly {
			background: rgba(0, 0, 0, 0.6);
			color: #00e5ff;
		}

		#hud-debug {
			background: rgba(0, 0, 0, 0.6);
			color: #ff9800;
		}
	</style>
</head>

<body>
	<main></main>

	<!-- ONLINE LINKS -->
	<script type="module" src="https://q5js.org/q5.js"></script>
	<script type="importmap">
    { "imports": {
      "box2d3-wasm": "https://q5play.org/Box2D.deluxe.mjs"
    } }
  </script>
	<script type="module" src="https://q5play.org/q5play.js"></script>

	<!-- OFFLINE LINKS -->
	<!--
  <script type="module" src="/node_modules/q5/q5.js"></script>
  <script type="importmap">
    { "imports": {
      "box2d3-wasm": "/node_modules/box2d3-wasm/build/dist/es/deluxe/Box2D.deluxe.mjs"
    } }
  </script>
  <script type="module" src="/node_modules/q5play/q5play.js"></script>
  -->
	<div id="made-with-q5play" style="display:none"></div>
	
		<div id="debug-hud">
			<div id="hud-fly" class="hud-tag">FLY MODE [`]</div>
			<div id="hud-debug" class="hud-tag">DEBUG MODE [~]</div>
		</div>
		<div id="stopwatch">00:00.00</div>
		<div id="start-screen">
			<h1>Ready?</h1>
			<div id="start-time">Time: 00:00.00</div>
			<div id="start-prompt">Press Enter to start</div>
		</div>
		<div id="level-complete-screen">
			<h1>Level Complete!</h1>
			<div id="level-complete-score">Score: 0</div>
			<div id="level-complete-time">Time: 00:00.00</div>
			<div id="level-complete-records">Best Score: 0 | Best Time: --:--.--</div>
			<div id="level-complete-restart">Press R to restart</div>
		</div>

		<!-- YOUR SKETCH -->
	<script type="module" src="sketch.js"></script>
</body>

</html>
