<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="favicon.png">
	<title>q5play</title>
	<style>
		html,
		body {
			background-color: black;
			margin: 0;
			padding: 0;
			overflow: hidden;
			overscroll-behavior: none;
		}

		#debug-hud {
			position: fixed;
			top: 10px;
			right: 10px;
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			gap: 4px;
			pointer-events: none;
			font-family: monospace;
			font-size: 12px;
			z-index: 100;
		}

		#debug-hud .hud-tag {
			padding: 2px 8px;
			border-radius: 3px;
			display: none;
		}

		#hud-fly {
			background: rgba(0, 0, 0, 0.6);
			color: #00e5ff;
		}

		#hud-debug {
			background: rgba(0, 0, 0, 0.6);
			color: #ff9800;
		}
	</style>
</head>

<body>
	<main></main>

	<!-- ONLINE LINKS -->
	<script type="module" src="https://q5js.org/q5.js"></script>
	<script type="importmap">
    { "imports": {
      "box2d3-wasm": "https://q5play.org/Box2D.deluxe.mjs"
    } }
  </script>
	<script type="module" src="https://q5play.org/q5play.js"></script>

	<!-- OFFLINE LINKS -->
	<!--
  <script type="module" src="/node_modules/q5/q5.js"></script>
  <script type="importmap">
    { "imports": {
      "box2d3-wasm": "/node_modules/box2d3-wasm/build/dist/es/deluxe/Box2D.deluxe.mjs"
    } }
  </script>
  <script type="module" src="/node_modules/q5play/q5play.js"></script>
  -->
	<div id="made-with-q5play" style="display:none"></div>
	
	<div id="debug-hud">
		<div id="hud-fly" class="hud-tag">FLY MODE [`]</div>
		<div id="hud-debug" class="hud-tag">DEBUG MODE [~]</div>
	</div>

	<!-- YOUR SKETCH -->
	<script type="module" src="sketch.js"></script>
</body>

</html>
